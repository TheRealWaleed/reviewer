services:
  ai-reviewer:
    build: .
    ports:
      - "${PORT:-3000}:${PORT:-3000}"
    env_file:
      - .env
    volumes:
      - usage-data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:${PORT:-3000}/health/live').then(r => { if (!r.ok) process.exit(1) })"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  usage-data:
